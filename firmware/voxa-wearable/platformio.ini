[platformio]
default_envs = nano_esp32, nano_33_iot
src_dir = src
include_dir = include
test_dir = test

[env:nano_esp32]
platform = espressif32@6.12.0
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
lib_deps =
  h2zero/NimBLE-Arduino@2.3.7
  adafruit/Adafruit DRV2605 Library@1.2.4

[env:nano_33_iot]
platform = atmelsam@8.3.0
board = nano_33_iot
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
lib_deps =
  arduino-libraries/ArduinoBLE@2.1.0
  adafruit/Adafruit DRV2605 Library@1.2.4

[env:nano_33_iot_direct_pwm_test]
platform = atmelsam@8.3.0
board = nano_33_iot
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -DVOXA_DIRECT_PWM_DIAGNOSTIC
lib_deps =
  arduino-libraries/ArduinoBLE@2.1.0

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
  +<voxa_protocol.cpp>
  +<voxa_patterns.cpp>
build_flags =
  -std=c++17
  -Wall
  -Wextra
  -Werror
