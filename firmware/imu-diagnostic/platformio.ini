[platformio]
default_envs = nano_33_iot
src_dir = src
include_dir = include
test_dir = test

[env:nano_33_iot]
platform = atmelsam@8.3.0
board = nano_33_iot
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
lib_deps =
  arduino-libraries/ArduinoBLE@2.1.0

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
  +<imu_packet.cpp>
build_flags =
  -std=c++17
  -Wall
  -Wextra
  -Werror
